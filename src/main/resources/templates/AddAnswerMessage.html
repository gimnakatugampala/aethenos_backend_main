<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Answer</title>
  <style>
    /* Inline CSS */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #333;
    }
    p {
      color: #666;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #e41c28;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }

    .button:hover {
      background-color: #d02731;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row" style="text-align: center">
    <img src="https://aethenos.com/assets/images/logo/Header_Athenos_logo.png" style="width: 200px"/>
  </div>
  <br/>
  <h1>Your Question for <span class="fs-5"
                                    th:text="${courseTitle}"></span> Has Been Answered</h1>
  <p>Dear <span class="fs-5"
                th:text="${userName}"></span>,</p>
  <p>We are pleased to inform you that your question for the course (<b><span class="fs-5" th:text="${courseTitle}"></span></b>) has been answered by the instructor.</p>
  <p>Best regards,<br> The Aethenos Team</p>
</div>
</body>
</html>
