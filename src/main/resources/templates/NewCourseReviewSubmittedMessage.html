<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Course Review Submitted</title>
    <style>
        /* Inline CSS */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #e41c28;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        .button:hover {
            background-color: #d02731;
        }
        .star {
            color: #FFD700;
            font-size: 1.5em;
        }

        .highlight {
            font-weight: bold;
            color: #FF5733;
            background-color: #FFFF99;
            padding: 2px 4px;
            border-radius: 3px;
        }

    </style>
</head>
<body>
<div class="container">
    <div class="row" style="text-align: center">
        <img src="https://aethenos.com/assets/images/logo/Header_Athenos_logo.png" style="width: 200px"/>
    </div>
    <br/>
    <h1>New Course Rating Submitted</h1>
    <p>Dear <span class="fs-5"
                  th:text="${userName}"></span>,</p>
    <p>We wanted to let you know that <b><span class="fs-5" th:text="${studentName}"></span></b> has left a review for your
        course, <b><span class="fs-5" th:text="${courseTitle}"></span></b> . Here are the details of the review:</p>
    <p>------------------------------------------------------------------------</p>
    <p>Student Name: <span class="fs-5" th:text="${studentName}"></span></p>
    <p>Rating: <span class="star">&#9733;</span> <span class="fs-5 highlight" th:text="${ratingCount}"></span></p>
    <p>Review: <br/>
        <span class="fs-5" th:text="${review}"></span></p>
    <p>-------------</p>
    <p>Best regards,<br> The Aethenos Team</p>
</div>
</body>
</html>
