<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Verification Code</title>
    <style>
        /* Inline CSS */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row" style="text-align: center">
        <img src="https://aethenos.com/assets/images/logo/Header_Athenos_logo.png" style="width: 200px"/>
    </div>
    <br/>
    <p>Dear <span class="fs-5" th:text="${userName}"></span>,</p>
    <p>You have requested to reset your password. Please use the verification code below to proceed with the password reset process:</p>
    <h1><span class="fs-5" th:text="${verificationCode}"></span></h1>
    <p>If you did not request a password reset, please ignore this email or contact our support team for assistance.</p>
    <p>Best regards,<br> The Aethenos Team</p>
</div>
</body>
</html>
